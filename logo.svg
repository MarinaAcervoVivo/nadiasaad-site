<!-- Nadia Saad — Logo: Símbolo Oriental (Lotus) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" role="img" aria-label="Logo Nadia Saad">
  <!-- Anel externo (Enso — círculo zen) -->
  <circle cx="12" cy="12" r="9.5" fill="none" stroke="currentColor" stroke-width="1.25"/>
  <!-- 4 pétalas (lótus / símbolo oriental) -->
  <ellipse cx="12" cy="9.2" rx="1.6" ry="2.9" opacity="0.82"/>
  <ellipse cx="12" cy="14.8" rx="1.6" ry="2.9" opacity="0.82"/>
  <ellipse cx="9.2" cy="12" rx="2.9" ry="1.6" opacity="0.82"/>
  <ellipse cx="14.8" cy="12" rx="2.9" ry="1.6" opacity="0.82"/>
  <!-- Núcleo central -->
  <circle cx="12" cy="12" r="1.6"/>
</svg>
